<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Evaluasi Bab 2 Sosiologi – 30 Soal (PG, Multi, Menjodohkan)</title>
  <meta name="description" content="Soal evaluasi sosiologi kelas X bab 2: individu, kelompok, interaksi, lembaga sosial. Dilengkapi timer 60 menit, proteksi, dan download PDF.">
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1234355696976048" crossorigin="anonymous"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* proteksi teks terpilih */
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f0f4fa 0%, #d9e2ef 100%);
      padding: 20px;
      transition: 0.3s;
    }
    /* proteksi copy & right click */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    /* container utama */
    .exam-container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
      overflow: hidden;
      padding: 25px 30px;
      transition: 0.3s;
    }
    /* header identitas */
    .identity-bar {
      background: #2c3e50;
      color: white;
      padding: 20px 25px;
      border-radius: 24px;
      margin-bottom: 25px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: space-between;
      align-items: flex-end;
    }
    .identity-fields {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .identity-fields div {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .identity-fields label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      opacity: 0.8;
    }
    .identity-fields input {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      padding: 10px 15px;
      border-radius: 40px;
      color: white;
      font-weight: 500;
      width: 200px;
      outline: none;
    }
    .identity-fields input::placeholder {
      color: rgba(255,255,255,0.7);
    }
    .timer-area {
      background: #1abc9c;
      padding: 12px 24px;
      border-radius: 60px;
      text-align: center;
      font-weight: 800;
      font-size: 1.7rem;
      letter-spacing: 2px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .timer-area span {
      font-size: 0.9rem;
      display: block;
      font-weight: 500;
    }
    /* iklan */
    .ad-top {
      margin: 15px 0 20px;
      text-align: center;
      background: #f8fafc;
      border-radius: 20px;
      padding: 8px;
    }
    /* bagian soal */
    .section-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 25px 0 15px 0;
      padding-bottom: 8px;
      border-bottom: 3px solid #3498db;
      display: inline-block;
    }
    .question-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 18px 22px;
      margin-bottom: 20px;
      box-shadow: 0 5px 12px rgba(0,0,0,0.05);
      border: 1px solid #e2edf7;
      transition: 0.2s;
    }
    .question-text {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 14px;
      color: #1e2a3e;
    }
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-top: 8px;
    }
    .option {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8fafd;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
    }
    input[type="radio"], input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    /* tabel menjodohkan */
    .matching-table {
      width: 100%;
      border-collapse: collapse;
      background: #fefefe;
    }
    .matching-table td, .matching-table th {
      border: 1px solid #cbd5e1;
      padding: 12px;
      vertical-align: middle;
    }
    select {
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid #cbd5e1;
      background: white;
      font-weight: 500;
    }
    .action-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 30px 0 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .btn-primary {
      background: #2c3e50;
      color: white;
    }
    .btn-primary:hover {
      background: #1a2a3a;
      transform: scale(1.02);
    }
    .btn-success {
      background: #27ae60;
      color: white;
    }
    .btn-warning {
      background: #e67e22;
      color: white;
    }
    .score-area {
      background: #ecf0f1;
      padding: 15px;
      border-radius: 28px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 20px;
    }
    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.75rem;
      color: #5a6e7c;
    }
    @media (max-width: 700px) {
      .exam-container { padding: 15px; }
      .options { gap: 10px; }
      .option { padding: 4px 10px; }
    }
    /* print style untuk download PDF */
    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
        user-select: auto;
      }
      .exam-container {
        box-shadow: none;
        padding: 0;
        max-width: 100%;
      }
      .ad-top, .action-buttons, .timer-area, .btn, .identity-bar .timer-area, #submitBtn, #downloadPDFBtn, .ad-container {
        display: none !important;
      }
      .identity-bar {
        background: #2c3e50;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .question-card {
        break-inside: avoid;
        page-break-inside: avoid;
      }
      input, select {
        border: 1px solid black;
        background: transparent;
      }
    }
  </style>
</head>
<body>
<div class="exam-container">
  <!-- Form Identitas + Timer -->
  <div class="identity-bar">
    <div class="identity-fields">
      <div><label>NAMA LENGKAP</label><input type="text" id="studentName" placeholder="Contoh: Ahmad Wijaya"></div>
      <div><label>KELAS</label><input type="text" id="studentClass" placeholder="X IPS 1"></div>
      <div><label>TANGGAL</label><input type="date" id="examDate" value="2026-04-21"></div>
    </div>
    <div class="timer-area">
      <span><i class="far fa-hourglass-half"></i> Sisa Waktu</span>
      <span id="timerDisplay">60:00</span>
    </div>
  </div>

  <!-- Iklan AdSense (slot diminta) -->
  <div class="ad-top">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1234355696976048" data-ad-slot="3223142906" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <!-- Soal akan di-generate via JS agar mudah -->
  <div id="questionsContainer"></div>

  <!-- Tombol aksi -->
  <div class="action-buttons">
    <button class="btn btn-primary" id="submitBtn"><i class="fas fa-check-circle"></i> Submit & Lihat Skor</button>
    <button class="btn btn-success" id="downloadPDFBtn"><i class="fas fa-file-pdf"></i> Download PDF (Cetak)</button>
  </div>
  <div id="scoreDisplay" class="score-area" style="display: none;"></div>
  <footer>© 2025 | Soal Sosiologi Bab 2 | Dilarang menyalin tanpa izin</footer>
</div>

<script>
  // ---------- PROTEKSI TAMBAHAN ----------
  document.addEventListener('contextmenu', (e) => e.preventDefault());
  document.addEventListener('keydown', (e) => {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'u')) {
      e.preventDefault();
    }
  });
  document.querySelectorAll('input, select, textarea').forEach(el => {
    el.addEventListener('copy', (e) => e.preventDefault());
    el.addEventListener('cut', (e) => e.preventDefault());
    el.addEventListener('paste', (e) => e.preventDefault());
  });

  // ========== DATA SOAL ==========
  // 1. PG biasa (20 soal) a-e
  const pgSoal = [
    { text: "Istilah 'individu' berasal dari bahasa Latin 'individuum' yang berarti...", options: ["Kesatuan sosial", "Tidak terbagi", "Makhluk otonom", "Bagian kelompok", "Pribadi unik"], correct: 1 },
    { text: "Kelompok yang memiliki hubungan akrab, personal, dan langgeng disebut kelompok...", options: ["Sekunder", "Referensi", "Primer", "Out-group", "Formal"], correct: 2 },
    { text: "Menurut Soerjono Soekanto, syarat utama terjadinya interaksi sosial adalah...", options: ["Kontak sosial dan komunikasi", "Imitasi dan sugesti", "Simpati dan empati", "Identifikasi dan imitasi", "Kerja sama dan akomodasi"], correct: 0 },
    { text: "Bentuk interaksi asosiatif berupa usaha bersama mencapai tujuan disebut...", options: ["Akomodasi", "Asimilasi", "Akulturasi", "Kerja sama", "Koersi"], correct: 3 },
    { text: "Percampuran dua kebudayaan yang menghasilkan kebudayaan baru disebut...", options: ["Akulturasi", "Asimilasi", "Akomodasi", "Sinkretisme", "Dominasi"], correct: 1 },
    { text: "Contoh kelompok sekunder adalah...", options: ["Keluarga", "Sahabat karib", "Organisasi profesi", "Suku tertentu", "Tim futsal"], correct: 2 },
    { text: "Kelompok yang menjadi acuan sikap dan perilaku individu disebut kelompok...", options: ["In-group", "Out-group", "Referensi", "Primer", "Formal"], correct: 2 },
    { text: "Berikut yang termasuk interaksi disosiatif adalah...", options: ["Kerja sama", "Asimilasi", "Akomodasi", "Konflik", "Akulturasi"], correct: 3 },
    { text: "Faktor pendorong interaksi yang berupa ketertarikan mendalam tanpa logika disebut...", options: ["Simpati", "Empati", "Imitasi", "Sugesti", "Identifikasi"], correct: 3 },
    { text: "Lembaga sosial yang berfungsi mengatur produksi, distribusi, dan konsumsi adalah lembaga...", options: ["Keluarga", "Pendidikan", "Ekonomi", "Agama", "Politik"], correct: 2 },
    { text: "Menurut Robert Mac Iver, lembaga sosial adalah prosedur yang mengatur...", options: ["Hubungan antarnegara", "Hubungan antarmanusia dalam masyarakat", "Sistem ekonomi", "Norma keagamaan", "Pertahanan negara"], correct: 1 },
    { text: "Contoh lembaga politik adalah...", options: ["Partai politik", "Sekolah", "Gereja", "Koperasi", "Keluarga"], correct: 0 },
    { text: "Dalam sosiologi, individu memiliki peran ganda sebagai...", options: ["Makhluk ekonomi dan politik", "Makhluk otonom dan bagian masyarakat", "Subjek hukum dan objek", "Individu dan kelompok", "Warga negara dan keluarga"], correct: 1 },
    { text: "Kelompok out-group adalah...", options: ["Kelompok yang menjadi idola", "Kelompok yang dianggap lawan/saingan", "Kelompok primer", "Kelompok formal", "Kelompok referensi"], correct: 1 },
    { text: "Sikap meniru secara keseluruhan kepribadian orang lain disebut...", options: ["Imitasi", "Identifikasi", "Simpati", "Empati", "Sugesti"], correct: 1 },
    { text: "Lembaga sosial yang memiliki fungsi transmisi budaya dan penyiapan tenaga kerja adalah...", options: ["Agama", "Keluarga", "Pendidikan", "Politik", "Ekonomi"], correct: 2 },
    { text: "Bentuk kontravensi dalam interaksi sosial adalah...", options: ["Perkelahian", "Kerja sama", "Persaingan sehat", "Sikap tidak suka tersembunyi", "Asimilasi"], correct: 3 },
    { text: "Contoh akulturasi di Indonesia adalah...", options: ["Bangunan candi dengan arsitektur India", "Masakan soto dari campuran budaya", "Menggunakan jas namun tetap pakai batik", "Tarian saman", "Upacara ngaben"], correct: 2 },
    { text: "Lembaga yang bertugas memelihara ketertiban dan menegakkan keadilan disebut lembaga...", options: ["Keluarga", "Politik & peradilan", "Ekonomi", "Agama", "Pendidikan"], correct: 1 },
    { text: "Yang BUKAN termasuk kelompok primer adalah...", options: ["Keluarga", "Geng sahabat dekat", "Serikat pekerja", "Rukun tetangga akrab", "Teman sekelas yang karib"], correct: 2 }
  ];

  // 2. Multi jawaban (5 soal) – setiap soal punya array jawaban benar (indeks)
  const multiSoal = [
    { text: "Faktor-faktor pendorong interaksi sosial (pilih 3 yang benar):", options: ["Sugesti", "Imitasi", "Konflik", "Identifikasi", "Akomodasi"], correctIndices: [0,1,3] },
    { text: "Berikut yang termasuk kelompok sosial berdasarkan hubungan (pilih 2):", options: ["Kelompok primer", "Kelompok sekunder", "Kelompok umur", "Kelompok ras", "Kelompok referensi"], correctIndices: [0,1] },
    { text: "Ciri-ciri lembaga sosial (pilih 3):", options: ["Memiliki simbol", "Umur lebih pendek dari manusia", "Memiliki tata tertib", "Memiliki alat kelengkapan", "Hanya bersifat lokal"], correctIndices: [0,2,3] },
    { text: "Bentuk interaksi asosiatif (pilih 3):", options: ["Kerja sama", "Akomodasi", "Persaingan", "Asimilasi", "Konflik"], correctIndices: [0,1,3] },
    { text: "Lembaga sosial yang termasuk dalam lembaga pengendalian sosial (pilih 2):", options: ["Lembaga agama", "Lembaga ekonomi", "Lembaga hukum", "Lembaga pendidikan", "Lembaga bisnis"], correctIndices: [0,2,3] } // ambil 3 yang relevan
  ];

  // 3. Menjodohkan (5 pasangan) – kolom kiri istilah, kanan pilihan (dropdown)
  const matchingLeft = [
    "Kelompok referensi",
    "Kelompok out-group",
    "Asimilasi",
    "Akulturasi",
    "Lembaga keluarga"
  ];
  const matchingRightOptions = [
    "A. Kelompok yang menjadi acuan sikap",
    "B. Kelompok yang dianggap rival",
    "C. Percampuran budaya jadi budaya baru",
    "D. Menerima budaya asing tanpa menghilangkan asli",
    "E. Unit sosialisasi pertama bagi individu"
  ];
  const matchingAnswers = [0,1,2,3,4]; // mapping: left index -> right option index (0=A,1=B,...)

  // ========== RENDER SEMUA SOAL ==========
  let pgAnswers = new Array(pgSoal.length).fill(null);
  let multiAnswers = new Array(multiSoal.length).fill([]);
  let matchingAnswersUser = new Array(matchingLeft.length).fill('');

  function renderQuestions() {
    let html = '';
    // bagian A: PG biasa
    html += `<div><h2 class="section-title"><i class="fas fa-check-circle"></i> A. Pilihan Ganda (1-20)</h2></div>`;
    pgSoal.forEach((q, idx) => {
      html += `<div class="question-card" data-qtype="pg" data-idx="${idx}">
        <div class="question-text"><strong>${idx+1}.</strong> ${q.text}</div>
        <div class="options">`;
      q.options.forEach((opt, optIdx) => {
        let letter = String.fromCharCode(97+optIdx); // a,b,c,d,e
        html += `<label class="option"><input type="radio" name="pg_${idx}" value="${optIdx}"> <span>${letter.toUpperCase()}. ${opt}</span></label>`;
      });
      html += `</div></div>`;
    });

    // bagian B: Multi jawaban
    html += `<div><h2 class="section-title"><i class="fas fa-check-double"></i> B. Multi Jawaban (21-25) - Pilih lebih dari satu</h2></div>`;
    multiSoal.forEach((q, idx) => {
      html += `<div class="question-card" data-qtype="multi" data-idx="${idx}">
        <div class="question-text"><strong>${21+idx}.</strong> ${q.text}</div>
        <div class="options" style="flex-direction: column; gap: 8px;">`;
      q.options.forEach((opt, optIdx) => {
        html += `<label class="option"><input type="checkbox" name="multi_${idx}" value="${optIdx}"> ${String.fromCharCode(97+optIdx)}. ${opt}</label>`;
      });
      html += `</div></div>`;
    });

    // bagian C: Menjodohkan
    html += `<div><h2 class="section-title"><i class="fas fa-puzzle-piece"></i> C. Menjodohkan (26-30)</h2></div>`;
    html += `<div class="question-card"><table class="matching-table">
      <thead><tr><th>No.</th><th>Istilah / Pernyataan</th><th>Pasangan Jawaban (pilih A-E)</th></tr></thead><tbody>`;
    for(let i=0; i<matchingLeft.length; i++) {
      html += `<tr>
        <td>${26+i}</td>
        <td><strong>${matchingLeft[i]}</strong></td>
        <td><select id="match_${i}" data-matchidx="${i}">
          <option value="">-- Pilih --</option>
          ${matchingRightOptions.map((opt, oidx) => `<option value="${oidx}">${opt}</option>`).join('')}
        </select></td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
    document.getElementById('questionsContainer').innerHTML = html;

    // event listeners untuk menyimpan jawaban PG & Multi
    for(let i=0; i<pgSoal.length; i++) {
      let radios = document.querySelectorAll(`input[name="pg_${i}"]`);
      radios.forEach(radio => {
        radio.addEventListener('change', (e) => {
          pgAnswers[i] = parseInt(e.target.value);
        });
      });
    }
    for(let i=0; i<multiSoal.length; i++) {
      let checkboxes = document.querySelectorAll(`input[name="multi_${i}"]`);
      checkboxes.forEach(cb => {
        cb.addEventListener('change', () => {
          let checkedVals = Array.from(checkboxes).filter(ch => ch.checked).map(ch => parseInt(ch.value));
          multiAnswers[i] = checkedVals;
        });
      });
    }
    for(let i=0; i<matchingLeft.length; i++) {
      let sel = document.getElementById(`match_${i}`);
      sel.addEventListener('change', (e) => {
        matchingAnswersUser[i] = e.target.value !== '' ? parseInt(e.target.value) : '';
      });
    }
  }

  // ========== KOREKSI ==========
  function computeScore() {
    let scorePg = 0;
    for(let i=0; i<pgSoal.length; i++) {
      if(pgAnswers[i] !== null && pgAnswers[i] === pgSoal[i].correct) scorePg++;
    }
    let scoreMulti = 0;
    for(let i=0; i<multiSoal.length; i++) {
      let user = multiAnswers[i].sort((a,b)=>a-b);
      let correctArr = multiSoal[i].correctIndices.sort((a,b)=>a-b);
      if(user.length === correctArr.length && user.every((val,idx)=> val === correctArr[idx])) {
        scoreMulti += 2;   // bobot 2 per soal multi jika sempurna
      }
    }
    let scoreMatching = 0;
    for(let i=0; i<matchingLeft.length; i++) {
      if(matchingAnswersUser[i] !== '' && matchingAnswersUser[i] === matchingAnswers[i]) scoreMatching++;
    }
    let total = scorePg + scoreMulti + scoreMatching;
    let maxPg = pgSoal.length;
    let maxMulti = multiSoal.length * 2;
    let maxMatch = matchingLeft.length;
    let maxTotal = maxPg + maxMulti + maxMatch;
    return { scorePg, scoreMulti, scoreMatching, total, maxTotal };
  }

  // ========== SUBMIT & TAMPIL SKOR ==========
  let timerInterval;
  let timeLeft = 3600; // 60 menit = 3600 detik
  let examActive = true;
  function startTimer() {
    timerInterval = setInterval(() => {
      if(!examActive) return;
      if(timeLeft <= 0) {
        clearInterval(timerInterval);
        document.getElementById('timerDisplay').innerHTML = "00:00";
        alert("Waktu habis! Jawaban akan dikunci.");
        disableAllInputs();
        examActive = false;
        showFinalScore();
      } else {
        timeLeft--;
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        document.getElementById('timerDisplay').innerHTML = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
      }
    }, 1000);
  }

  function disableAllInputs() {
    document.querySelectorAll('input, select, button').forEach(el => {
      if(el.id !== 'downloadPDFBtn' && el.id !== 'submitBtn') el.disabled = true;
    });
  }

  function showFinalScore() {
    let { scorePg, scoreMulti, scoreMatching, total, maxTotal } = computeScore();
    let nama = document.getElementById('studentName').value || "Tanpa Nama";
    let kelas = document.getElementById('studentClass').value || "-";
    let tgl = document.getElementById('examDate').value;
    let scoreHtml = `<strong>📊 HASIL EVALUASI</strong><br>
      Nama: ${nama} | Kelas: ${kelas} | Tanggal: ${tgl}<br>
      ✅ PG (1-20): ${scorePg} / ${pgSoal.length}<br>
      ✅ Multi Jawaban (21-25): ${scoreMulti} / ${multiSoal.length*2} (bobot 2 tiap soal)<br>
      ✅ Menjodohkan (26-30): ${scoreMatching} / ${matchingLeft.length}<br>
      🎯 TOTAL SKOR: ${total} / ${maxTotal} (${Math.round((total/maxTotal)*100)} poin)`;
    let scoreDiv = document.getElementById('scoreDisplay');
    scoreDiv.innerHTML = scoreHtml;
    scoreDiv.style.display = 'block';
  }

  document.getElementById('submitBtn').addEventListener('click', () => {
    if(examActive) {
      clearInterval(timerInterval);
      examActive = false;
      disableAllInputs();
      showFinalScore();
      alert("Jawaban telah dikirim. Silakan lihat skor di bawah.");
    } else {
      showFinalScore();
    }
  });

  // download PDF via print
  document.getElementById('downloadPDFBtn').addEventListener('click', () => {
    window.print();
  });

  // inisialisasi
  renderQuestions();
  startTimer();

  // Memastikan jika timer habis semua otomatis nonaktif
  window.addEventListener('load', () => {
    // agar nilai awal tidak null tidak masalah
  });
</script>
</body>
</html>
