<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forum Diskusi Sosiologi - Ekonomi</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .forum-container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    /* Header Forum */
    .forum-header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      margin-bottom: 25px;
      text-align: center;
    }
    
    .forum-header h2 {
      color: #2d3748;
      font-size: 28px;
      margin-bottom: 10px;
    }
    
    .forum-header h2 i {
      color: #667eea;
      margin-right: 10px;
    }
    
    .forum-header p {
      color: #718096;
      font-size: 14px;
    }
    
    /* Form Komentar */
    .form-box {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      margin-bottom: 25px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .input-group {
      margin-bottom: 20px;
      position: relative;
    }
    
    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #a0aec0;
      z-index: 1;
    }
    
    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 15px 15px 15px 45px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s ease;
      background: white;
    }
    
    .input-group textarea {
      padding-left: 45px;
      padding-top: 15px;
      min-height: 100px;
      resize: vertical;
    }
    
    .input-group textarea + i {
      top: 25px;
      transform: none;
    }
    
    .input-group input:focus,
    .input-group textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    /* Search Box */
    .search-box {
      background: white;
      border-radius: 15px;
      padding: 5px;
      margin-bottom: 25px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
    }
    
    .search-box i {
      color: #a0aec0;
      margin-left: 15px;
    }
    
    .search-box input {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 15px;
      font-size: 15px;
    }
    
    .search-box input:focus {
      outline: none;
    }
    
    /* Stats */
    .stats {
      background: white;
      border-radius: 12px;
      padding: 15px 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }
    
    .stats-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4a5568;
    }
    
    .stats-item i {
      color: #667eea;
    }
    
    .badge {
      background: #667eea;
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    /* Comment Cards */
    .comment-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
      border-left: 4px solid #667eea;
    }
    
    .comment-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    
    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #edf2f7;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
    }
    
    .user-details {
      display: flex;
      flex-direction: column;
    }
    
    .user-name {
      font-weight: 700;
      color: #2d3748;
    }
    
    .user-class {
      font-size: 13px;
      color: #718096;
    }
    
    .comment-time {
      font-size: 12px;
      color: #a0aec0;
    }
    
    .comment-content {
      font-size: 15px;
      line-height: 1.6;
      color: #4a5568;
      margin-bottom: 15px;
      padding: 10px;
      background: #f7fafc;
      border-radius: 10px;
    }
    
    .comment-footer {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .like-button {
      background: none;
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      background: #f7fafc;
      color: #718096;
    }
    
    .like-button:hover:not(:disabled) {
      background: #fed7d7;
      color: #e53e3e;
      border-color: #e53e3e;
    }
    
    .like-button.liked {
      background: #fed7d7;
      color: #e53e3e;
      border-color: #e53e3e;
    }
    
    .like-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .like-count {
      font-weight: 700;
      min-width: 20px;
      text-align: center;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      background: white;
      border-radius: 15px;
      color: #a0aec0;
    }
    
    .empty-state i {
      font-size: 50px;
      margin-bottom: 15px;
      color: #cbd5e0;
    }
    
    /* Loading */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      padding: 15px 25px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
    }
    
    .toast.success {
      border-left: 4px solid #48bb78;
    }
    
    .toast.error {
      border-left: 4px solid #f56565;
    }
    
    .toast i.fa-check-circle {
      color: #48bb78;
    }
    
    .toast i.fa-exclamation-circle {
      color: #f56565;
    }
  </style>
</head>
<body>
  <div class="forum-container">
    <!-- Header Forum -->
    <div class="forum-header">
      <h2>
        <i class="fas fa-comments"></i>
        Forum Diskusi Sosiologi - Ekonomi
      </h2>
      <p>Tanyakan materi, diskusikan tugas, dan berbagi wawasan sosiologi - ekonomi</p>
    </div>
    
    <!-- Form Komentar -->
    <div class="form-box">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="name" placeholder="Nama lengkap" maxlength="50">
      </div>
      
      <div class="input-group">
        <i class="fas fa-graduation-cap"></i>
        <input type="text" id="kelas" placeholder="Kelas (contoh: XI. 7)" maxlength="20">
      </div>
      
      <div class="input-group">
        <i class="fas fa-pencil-alt"></i>
        <textarea id="comment" placeholder="Tulis pertanyaan atau pendapat Anda..."></textarea>
      </div>
      
      <button class="btn-primary" onclick="sendComment()" id="sendButton">
        <i class="fas fa-paper-plane"></i>
        Kirim ke Forum
      </button>
    </div>
    
    <!-- Search Box -->
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Cari diskusi atau nama..." onkeyup="searchComments()">
    </div>
    
    <!-- Stats -->
    <div class="stats">
      <div class="stats-item">
        <i class="fas fa-comment"></i>
        <span id="totalComments">0</span> Diskusi
      </div>
      <div class="stats-item">
        <i class="fas fa-heart"></i>
        <span id="totalLikes">0</span> Likes
      </div>
      <div class="badge">
        <i class="fas fa-circle" style="color: #48bb78; font-size: 10px;"></i>
        Live
      </div>
    </div>
    
    <!-- Daftar Komentar -->
    <div id="commentList"></div>
  </div>
  
  <!-- Toast Container -->
  <div id="toastContainer"></div>
  
  <script>
    // Konfigurasi Google Apps Script URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7FWrFd7v2I9glOXD0Iw9y4jDWXO7U5EBJWPDESkV54J8E90ZhxNMJqIx1WK7pdj7p/exec";
    
    let allComments = [];
    let isLoading = false;
    let isLiking = false;
    
    // Kata kasar filter
    const badWords = [
      "anjing", "bodoh", "tolol", "bangsat", "kampret",
      "kontol", "memek", "ngentot", "fuck", "shit", "babi",
      "goblok", "ngawur", "sialan", "brengsek"
    ];
    
    // Load komentar awal
    function loadComments() {
      if (isLoading) return;
      
      isLoading = true;
      showLoading();
      
      fetch(SCRIPT_URL + '?action=getComments')
        .then(response => response.json())
        .then(data => {
          console.log('Data received:', data);
          allComments = data || [];
          displayComments(allComments);
          updateStats();
          isLoading = false;
        })
        .catch(error => {
          console.error('Error loading comments:', error);
          showToast('Gagal memuat diskusi', 'error');
          isLoading = false;
          document.getElementById('commentList').innerHTML = `
            <div class="empty-state">
              <i class="fas fa-exclamation-circle"></i>
              <h3>Gagal memuat diskusi</h3>
              <p>Silakan refresh halaman</p>
            </div>
          `;
        });
    }
    
    // Tampilkan komentar
    function displayComments(comments) {
      const list = document.getElementById("commentList");
      
      if (!comments || comments.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-comment-slash"></i>
            <h3>Belum ada diskusi</h3>
            <p>Jadilah yang pertama berdiskusi tentang ekonomi!</p>
          </div>
        `;
        return;
      }
      
      let html = '';
      comments.forEach(comment => {
        const initials = comment.name ? comment.name.substring(0, 2).toUpperCase() : 'AN';
        const timeAgo = getTimeAgo(new Date(comment.timestamp));
        const isLiked = checkIfLiked(comment.row);
        
        html += `
          <div class="comment-card" id="comment-${comment.row}">
            <div class="comment-header">
              <div class="user-info">
                <div class="avatar">${escapeHtml(initials)}</div>
                <div class="user-details">
                  <div class="user-name">
                    ${escapeHtml(comment.name || 'Anonymous')}
                  </div>
                  <div class="user-class">
                    <i class="fas fa-graduation-cap"></i> ${escapeHtml(comment.kelas || 'Kelas')}
                  </div>
                </div>
              </div>
              <div class="comment-time">
                <i class="far fa-clock"></i>
                ${timeAgo}
              </div>
            </div>
            
            <div class="comment-content">
              ${escapeHtml(comment.comment || '').replace(/\n/g, '<br>')}
            </div>
            
            <div class="comment-footer">
              <button class="like-button ${isLiked ? 'liked' : ''}" 
                      onclick="like(${comment.row})"
                      ${isLiked ? 'disabled' : ''}
                      id="like-btn-${comment.row}">
                <i class="fas fa-heart"></i>
                <span class="like-count">${comment.likes || 0}</span>
                <span>Suka</span>
              </button>
            </div>
          </div>
        `;
      });
      
      list.innerHTML = html;
    }
    
    // Update statistik
    function updateStats() {
      const totalComments = allComments.length;
      const totalLikes = allComments.reduce((sum, comment) => sum + (comment.likes || 0), 0);
      
      document.getElementById('totalComments').textContent = totalComments;
      document.getElementById('totalLikes').textContent = totalLikes;
    }
    
    // Kirim komentar baru
    function sendComment() {
      const name = document.getElementById("name").value.trim();
      const kelas = document.getElementById("kelas").value.trim();
      const comment = document.getElementById("comment").value.trim();
      const sendButton = document.getElementById("sendButton");
      
      // Validasi
      if (!name || !kelas || !comment) {
        showToast('Semua field harus diisi', 'error');
        return;
      }
      
      if (name.length < 2) {
        showToast('Nama terlalu pendek', 'error');
        return;
      }
      
      if (comment.length < 3) {
        showToast('Komentar terlalu pendek', 'error');
        return;
      }
      
      // Filter kata kasar
      let text = comment.toLowerCase();
      for (let word of badWords) {
        if (text.includes(word)) {
          showToast('Komentar mengandung kata yang tidak pantas', 'error');
          return;
        }
      }
      
      // Disable button selama proses
      sendButton.disabled = true;
      sendButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengirim...';
      
      // Kirim ke server
      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: new URLSearchParams({
          action: 'addComment',
          name: name,
          kelas: kelas,
          comment: comment
        })
      })
      .then(() => {
        // Reset form
        document.getElementById("name").value = '';
        document.getElementById("kelas").value = '';
        document.getElementById("comment").value = '';
        
        // Enable button
        sendButton.disabled = false;
        sendButton.innerHTML = '<i class="fas fa-paper-plane"></i> Kirim ke Forum';
        
        showToast('Diskusi berhasil dikirim!', 'success');
        
        // Reload komentar setelah 1 detik
        setTimeout(() => {
          loadComments();
        }, 1000);
      })
      .catch(error => {
        console.error('Error sending comment:', error);
        showToast('Gagal mengirim diskusi', 'error');
        
        // Enable button
        sendButton.disabled = false;
        sendButton.innerHTML = '<i class="fas fa-paper-plane"></i> Kirim ke Forum';
      });
    }
    
    // Like komentar
    function like(row) {
      if (isLiking) return;
      
      const likeBtn = document.getElementById(`like-btn-${row}`);
      if (!likeBtn || likeBtn.disabled) return;
      
      isLiking = true;
      likeBtn.disabled = true;
      
      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: new URLSearchParams({
          action: 'likeComment',
          row: row
        })
      })
      .then(() => {
        // Simpan like ke localStorage
        saveLike(row);
        
        // Update tampilan
        const likeCount = likeBtn.querySelector('.like-count');
        likeCount.textContent = parseInt(likeCount.textContent) + 1;
        likeBtn.classList.add('liked');
        
        isLiking = false;
        showToast('👍 Anda menyukai diskusi ini!', 'success');
        
        // Reload komentar setelah 1 detik untuk sync
        setTimeout(() => {
          loadComments();
        }, 1000);
      })
      .catch(error => {
        console.error('Error liking comment:', error);
        showToast('Gagal memberi like', 'error');
        
        // Enable button kembali
        likeBtn.disabled = false;
        isLiking = false;
      });
    }
    
    // Cek apakah user sudah like
    function checkIfLiked(row) {
      try {
        const likedComments = JSON.parse(localStorage.getItem('forumLikedComments') || '[]');
        return likedComments.includes(row);
      } catch (e) {
        return false;
      }
    }
    
    // Simpan like ke localStorage
    function saveLike(row) {
      try {
        const likedComments = JSON.parse(localStorage.getItem('forumLikedComments') || '[]');
        if (!likedComments.includes(row)) {
          likedComments.push(row);
          localStorage.setItem('forumLikedComments', JSON.stringify(likedComments));
        }
      } catch (e) {
        console.warn('LocalStorage error:', e);
      }
    }
    
    // Search komentar
    function searchComments() {
      const keyword = document.getElementById("searchInput").value.toLowerCase().trim();
      
      if (!keyword) {
        displayComments(allComments);
        return;
      }
      
      const filtered = allComments.filter(comment => 
        (comment.comment && comment.comment.toLowerCase().includes(keyword)) ||
        (comment.name && comment.name.toLowerCase().includes(keyword)) ||
        (comment.kelas && comment.kelas.toLowerCase().includes(keyword))
      );
      
      displayComments(filtered);
    }
    
    // Helper functions
    function getTimeAgo(date) {
      try {
        const seconds = Math.floor((new Date() - date) / 1000);
        
        if (seconds < 60) return 'baru saja';
        
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return minutes + ' menit lalu';
        
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return hours + ' jam lalu';
        
        const days = Math.floor(hours / 24);
        if (days < 30) return days + ' hari lalu';
        
        const months = Math.floor(days / 30);
        if (months < 12) return months + ' bulan lalu';
        
        const years = Math.floor(months / 12);
        return years + ' tahun lalu';
      } catch (e) {
        return 'baru saja';
      }
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function showToast(message, type = 'success') {
      const toastContainer = document.getElementById('toastContainer');
      const toastId = 'toast-' + Date.now();
      
      const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
      
      const toast = document.createElement('div');
      toast.id = toastId;
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i class="fas ${icon}"></i>
        <span>${message}</span>
      `;
      
      toastContainer.appendChild(toast);
      
      setTimeout(() => {
        const element = document.getElementById(toastId);
        if (element) {
          element.remove();
        }
      }, 3000);
    }
    
    function showLoading() {
      const list = document.getElementById("commentList");
      list.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
        </div>
      `;
    }
    
    // Realtime updates (setiap 5 detik)
    function startRealtimeUpdates() {
      setInterval(() => {
        if (!isLoading && document.visibilityState === 'visible') {
          fetch(SCRIPT_URL + '?action=getComments')
            .then(response => response.json())
            .then(data => {
              if (JSON.stringify(data) !== JSON.stringify(allComments)) {
                allComments = data || [];
                displayComments(allComments);
                updateStats();
                showToast('💬 Ada diskusi baru!', 'success');
              }
            })
            .catch(error => console.error('Realtime update error:', error));
        }
      }, 5000);
    }
    
    // Inisialisasi
    window.onload = function() {
      loadComments();
      startRealtimeUpdates();
    };
  </script>
</body>
</html>
